# docker-compose.prod.yml
# Aquest fitxer està optimitzat per a un entorn de producció

services:
  mysql:
    image: mysql:8.0
    container_name: entrades_db_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: entrades_redis_prod
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entrades_backend_prod
    restart: always
    environment:
      DB_HOST: mysql
      APP_ENV: production
      APP_DEBUG: false
    depends_on:
      - mysql
      - redis

  websockets:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile # Caldria crear-lo per producció
    container_name: entrades_sockets_prod
    restart: always
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: entrades_frontend_prod
    restart: always
    environment:
      NUXT_PUBLIC_API_BASE: https://aminpassmaster.daw.inspedralbes.cat/api

  nginx:
    image: nginx:alpine
    container_name: entrades_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Volumes per SSL (Certbot)
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
      - websockets

volumes:
  mysql_prod_data:
